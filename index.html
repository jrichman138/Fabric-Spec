<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sewing fabric reference guide — needle, thread, and machine settings for the Singer Heavy Duty 4452.">

  <!-- Theme colour for mobile browser chrome -->
  <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f4f4f2" media="(prefers-color-scheme: light)">

  <!-- PWA / home-screen -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fabric Spec">

  <title>Fabric Spec</title>

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">

  <!-- PWA manifest & home-screen icon -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <noscript>
    <p style="padding:24px;font-family:sans-serif">Fabric Spec requires JavaScript to run.</p>
  </noscript>

  <div id="app">

    <div id="detail-view" class="is-empty">

      <!-- Left: content column -->
      <div id="detail-main">
        <header id="toolbar">
          <div id="toolbar-select-wrap">
            <label for="toolbar-select" class="sr-only">Select a fabric</label>
            <select id="toolbar-select" autocomplete="off" aria-label="Select a fabric"></select>
            <span class="material-icons select-chevron" aria-hidden="true">expand_more</span>
          </div>
          <div id="font-size-wrap">
            <button id="font-size-btn" aria-label="Adjust text size" aria-expanded="false">
              <span class="material-icons" aria-hidden="true">format_size</span>
            </button>
            <div id="font-size-panel" hidden>
              <span class="font-label-sm">A</span>
              <input type="range" id="font-size-slider" min="11" max="19" value="13" step="1" aria-label="Text size">
              <span class="font-label-lg">A</span>
            </div>
          </div>
          <button id="theme-toggle" aria-label="Toggle light/dark mode">
            <span class="material-icons" aria-hidden="true">light_mode</span>
          </button>
        </header>
        <main id="detail-panel" aria-live="polite" aria-atomic="false">
          <div id="placeholder">
            <div id="placeholder-logo">Fabric<br>Spec</div>
            <p>Specs are based on the Singer 4452.<br>They may not work on other machines.</p>
          </div>
          <div id="fabric-detail" hidden></div>
        </main>
      </div>

      <!-- Right: decorative background panel (desktop only) -->
      <div id="detail-bg" aria-hidden="true">
        <div id="detail-bg-logo">Fabric<br>Spec</div>
      </div>

    </div>

  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
