# Fabric Reference Guide
> Singer Heavy Duty 4452 · Schmetz & Singer Needles · Gütermann Thread

---

## Natural

### Duck Canvas

**Tags:** `workwear` `shell` `pack` `structure` `pocket`

**Needle**
- Primary: Schmetz Jeans/Denim 90/14 or 100/16 (for heavier weights)
- Alternative: Singer Heavy Duty 90/14

**Thread**
- Gütermann Mara 70 or Mara 100 (all-purpose polyester) for seams
- Gütermann Mara 30 for topstitching

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 3.0–4.0 mm
- Stitch width: 0 (straight stitch)
- Tension: 4–5 (slightly higher than default)
- Presser foot: Walking foot strongly recommended; standard foot workable on lighter weights

**Quick Tips**
- Use clips instead of pins to avoid permanent holes
- Flatten seam allowances with a rubber mallet before sewing
- Backstitch generously. Duck canvas takes stress at seams
- Pre-wash if you want preshrunk results; skip if you want the stiff hand

**Detail**
Duck canvas is tightly woven and dense. Run the 4452 at full motor speed through thick seam crossings. Slowing down invites skipped stitches. A seam roller helps feed even layers. Flat-felled or French seams add workwear durability. Mara 30 topstitching holds up to heavy use.

---

### Hemp Canvas

**Tags:** `workwear` `structure` `pants` `pocket`

**Needle**
- Primary: Schmetz Jeans 90/14 or 100/16
- Alternative: Schmetz Universal 100/16

**Thread**
- Gütermann Mara 70 for seams
- Gütermann Mara 30 for topstitching

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 3.0–3.5 mm
- Stitch width: 0 (straight stitch)
- Tension: 4–5
- Presser foot: Walking foot strongly recommended on heavier weights

**Quick Tips**
- Pre-wash twice. Hemp shrinks significantly and the weave tightens with each wash cycle
- Cut edges fray roughly; finish promptly with a serge or zigzag pass
- The fabric is stiff out of the bolt and softens dramatically with use. Don't judge final hand off the raw material
- Use clips, not pins, on oil-finished or coated versions

**Detail**
Hemp canvas is duck's natural-fiber cousin. Comparable weight and weave, but longer fibers give it better abrasion resistance per gram. Use it for aprons, workwear pants, tool rolls, and market bags. Pure hemp is rare; 55/45 and 70/30 hemp/cotton blends are easier to source. Sew it like duck canvas: heavy needle, polyester thread, walking foot for stacked layers. The differences are pronounced first-wash shrinkage and a stiff initial hand. Both resolve after one laundering. For workwear that molds to the wearer, hemp rewards the effort.

---

### Waxed Canvas

**Tags:** `shell` `pack` `workwear` `structure`

**Needle**
- Primary: Schmetz Microtex Sharp 80/12 or 90/14
- Alternative: Schmetz Jeans 90/14 (if Microtex skips on heavier wax coatings)

**Thread**
- Gütermann Mara 70 (polyester — resists moisture better than cotton thread)
- Avoid cotton thread — wax accelerates degradation over time

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 3.0–3.5 mm
- Stitch width: 0 (straight stitch)
- Tension: 4 (test on scrap — wax coating affects thread pull)
- Presser foot: Teflon foot recommended; wax buildup will stick to standard metal foot

**Quick Tips**
- Use clips only. Pins leave permanent holes in waxed canvas
- Wipe the needle frequently with a cloth; wax buildup causes drag and skipped stitches
- Seams don't need finishing. Waxed canvas resists fraying naturally
- Re-wax seam lines after sewing to restore water resistance

**Detail**
Wax transfers to the presser foot and needle, creating drag and uneven stitching. A Teflon or roller foot is the biggest quality-of-life upgrade for this fabric. Sewing in a warm room softens the wax and improves feed. Skip the iron. Heat melts wax into uneven patches. Crease folds with a fingernail or bone folder. Bar tack stress points on bags and field gear.

---

### Cotton Twill

**Tags:** `workwear` `shell` `pocket` `lining`

**Needle**
- Primary: Schmetz Universal 80/12 or 90/14
- Alternative: Schmetz Jeans 80/12 for tighter weaves

**Thread**
- Gütermann Mara 100 for seams
- Gütermann Mara 70 or Mara 30 for topstitching

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 0 (straight stitch); 5.0 mm zigzag for edge finishing
- Tension: 4 (standard)
- Presser foot: Standard foot; walking foot for multiple layers

**Quick Tips**
- Pre-wash to account for shrinkage before cutting
- Serge or zigzag raw edges. Twill frays readily
- Diagonal weave means bias edges stretch easily; handle cut pieces carefully
- Press seams open for flatter, more professional results

**Detail**
Cotton twill is forgiving. Feed is consistent, tension is predictable, and it presses easily. The diagonal weave drapes well and works for pants, aprons, and jackets. The watch-out is fraying. Finish raw edges immediately after cutting. For workwear durability, drop to a 2.5 mm stitch and double-stitch stress points. Mara 100 in a matching color is the default. Step up to Mara 70 for high-stress seams.

---

### Denim

**Tags:** `workwear` `structure` `pants` `pocket`

**Needle**
- Primary: Schmetz Jeans/Denim 90/14
- Alternative: Schmetz Jeans/Denim 100/16 for 14oz+ weights

**Thread**
- Gütermann Mara 70 for seams (high-tenacity polyester)
- Gütermann Mara 30 for topstitching (gold, orange, or matching tone)

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm for seams; 3.0–3.5 mm for topstitching
- Stitch width: 0 (straight stitch)
- Tension: 4–5 for seams; 5–6 for topstitching with Mara 30
- Presser foot: Walking foot strongly recommended; hump jumper or shim for thick intersections

**Quick Tips**
- Use a hump jumper (or fold a piece of cardboard) under the back of the foot when crossing thick seam intersections. It levels the foot so feed dogs stay engaged and the needle goes through cleanly
- Sew at full speed through thick layers. Slow speed bogs the motor and lets the needle deflect on the diagonal weave
- Change to a fresh jeans needle for each major project; denim dulls needles fast
- Bar tack pocket corners and fly stops. They're the failure points on every pair of jeans without them

**Detail**
Denim is a warp-faced cotton twill. 10–12oz handles most jeans and jean jackets. 14oz+ pushes the 4452 hard. The signature challenge is the inseam intersection, where four to six layers stack. A hump jumper levels the foot so the feed dogs stay engaged and the needle doesn't deflect off the layer step. Mara 30 in a contrasting color is the classic topstitching choice. It needs a heavier needle and slightly higher tension to set into the dense weave. Skip pre-washing raw denim for shrink-to-fit results, but expect 5–10% shrinkage on the first wash. Pre-washed denim sews more predictably and is the right starting point for a first pair.

---

### Cotton Sateen

**Tags:** `pants` `workwear` `shirt`

**Needle**
- Primary: Schmetz Microtex Sharp 80/12
- Alternative: Schmetz Universal 80/12

**Thread**
- Gütermann Mara 100 for seams
- Gütermann Mara 70 for topstitching and stress seams

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 0 (straight stitch)
- Tension: 4
- Presser foot: Standard foot; walking foot for heavier sateens

**Quick Tips**
- Cut all pieces in the same direction. Sateen has a subtle sheen direction that's only obvious once a garment is assembled
- Use a fresh, sharp needle. The dense weave shows skipped stitches and tension flaws plainly on the smooth surface
- Press seams open with steam for a flat, tailored finish
- Pre-wash to remove sizing. Sateen often comes heavily starched off the bolt

**Detail**
Cotton sateen is a smooth, lustrous weave used for British military trousers (the 107 pattern), traditional chinos, and dressier workwear pants. Long warp floats give it a soft sheen on the face and a matte cotton back. Denser than twill, it shows stitch flaws plainly. Clean tension and a fresh needle matter. Microtex needles pierce the tight weave without deflecting yarns. Use flat-felled or French seams on pants. Press seams open on shirts. The sheen direction is subtle but real. Cut all pieces with the same orientation.

---

### Cotton Poplin

**Tags:** `shirt` `lining` `pocket`

**Needle**
- Primary: Schmetz Microtex Sharp 70/10 or 80/12
- Alternative: Schmetz Universal 80/12

**Thread**
- Gütermann Mara 120 for fine poplin
- Gütermann Mara 100 for standard weight

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.0–2.5 mm
- Stitch width: 0 (straight stitch); 4.0 mm zigzag for edge finishing
- Tension: 3.5–4
- Presser foot: Standard foot

**Quick Tips**
- Pre-wash. Quality poplin shrinks, and you want the shrinkage to happen before the fabric is cut
- Press seams as you go; cotton poplin holds a crease beautifully and shows unpressed seams clearly
- Use Microtex needles to avoid visible holes in the tight plain weave
- Edge-finish promptly. Poplin frays steadily once cut

**Detail**
Cotton poplin is a tight plain-weave cotton with a slight ribbed texture (weft heavier than warp). It's the workhorse shirting fabric for button-ups, light pants, and pocket bags. Compared to polyester broadcloth, it presses crisper and frays harder. A Microtex needle pushes through cleanly without leaving visible holes, which matters on shirts. Use 2.0 mm stitches for collar and cuff topstitching, 2.5 mm for side seams. Press seams open on dressier shirts, to one side and topstitch on workshirts.

---

### Chambray

**Tags:** `workwear` `shirt` `shell` `lining` `pocket`

**Needle**
- Primary: Schmetz Universal 80/12
- Alternative: Schmetz Microtex Sharp 80/12

**Thread**
- Gütermann Mara 100 for seams
- Gütermann Mara 70 for topstitching

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 0 (straight stitch); 4.0 mm zigzag for edge finishing
- Tension: 4
- Presser foot: Standard foot

**Quick Tips**
- Pre-wash. Chambray loses noticeable size and softens significantly after the first wash
- Frays steadily once cut; serge, zigzag, or French-seam raw edges
- Looks like denim but behaves like shirting. Don't reach for a jeans needle out of habit
- Contrasting topstitching thread (gold, white, or red) gives the classic workshirt look

**Detail**
Chambray is a plain-weave cotton with a colored warp and white weft. It looks like lightweight denim but drapes like fine shirting cotton. It's the canonical American workshirt fabric, from chore coats to Eisenhower jackets to modern button-ups. Despite the denim look, sew it like poplin: universal or Microtex needle, standard tension, prompt edge finishing. Flat-felled seams give the authentic workshirt look and add durability. Contrasting topstitching on yokes and patch pockets makes chambray read as workwear rather than dress.

---

### Flannel

**Tags:** `workwear` `shirt` `midlayer` `lining`

**Needle**
- Primary: Schmetz Universal 80/12
- Alternative: Schmetz Microtex Sharp 80/12

**Thread**
- Gütermann Mara 100

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 0 (straight stitch); 4.0 mm zigzag for edge finishing
- Tension: 4
- Presser foot: Walking foot helps with thicker flannels and lined construction

**Quick Tips**
- Pre-wash twice. Flannel shrinks noticeably and unpredictably; better to wash off the bolt before cutting
- Match plaids and checks before cutting. Flannel patterns are usually directional and obvious when misaligned
- Brush lint out of the bobbin area between sewing sessions; the nap sheds significantly
- Press from the back with steam to avoid flattening or scorching the brushed face

**Detail**
Flannel is brushed cotton in twill or plain weave. The brushed nap traps air and adds warmth at minimal weight cost. The main sewing considerations are shrinkage (often 5–10% on first wash) and plaid matching. Plaid alignment is what separates a store-bought-looking flannel from a homemade-looking one. Cut single-layer, use plenty of clips to align repeats at seam lines. The nap hides pins and causes slight feed inconsistency. A walking foot helps on heavier flannels and when using flannel as a winter lining.

## Synthetic

### Nylon 7D

**Tags:** `ultralight` `lining` `pack` `shelter` `shell`

**Needle**
- Primary: Schmetz Microtex Sharp 60/8 or 65/9
- Alternative: Schmetz Universal 70/10 (if Microtex causes skipped stitches)

**Thread**
- Gütermann Mara 120 (fine polyester — matches the lightweight fabric)
- Avoid heavy thread; it will pucker the fabric

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 1.5–2.0 mm
- Stitch width: 0 (straight stitch)
- Tension: 3–3.5 (lighter tension to avoid puckering)
- Presser foot: Teflon foot; standard foot with tissue paper if Teflon unavailable

**Quick Tips**
- Use tissue paper above and below fabric when sewing. It prevents the feed dogs from chewing the fabric
- Sew slowly and steadily; don't let the fabric bunch at the start of a seam
- Hold thread tails when starting to prevent jamming
- Test tension on scrap every session. Humidity affects this fabric's behavior

**Detail**
7D nylon is extremely lightweight and slippery. It pulls into the feed dogs at seam starts, jamming and tearing. Start with the needle down and hold fabric taut, not stretched. Tissue paper under the seam line, torn away after, prevents most of this. Heat-seal or French-seam allowances; the fabric is too light for serging. Best for stuff sacks, ultralight wind layers, and pack linings.

---

### Nylon 70D

**Tags:** `shell` `pack` `pocket` `ultralight`

**Needle**
- Primary: Schmetz Microtex Sharp 70/10 or 75/11
- Alternative: Schmetz Universal 80/12

**Thread**
- Gütermann Mara 100 for seams
- Gütermann Mara 70 for topstitching or stress seams

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.0–2.5 mm
- Stitch width: 0 (straight stitch)
- Tension: 3.5–4
- Presser foot: Teflon foot preferred; standard foot workable

**Quick Tips**
- Clips preferred over pins. Pin holes are visible on coated versions
- Feed slowly at seam starts to prevent fabric being pulled into the machine
- Heat-seal cut edges with a lighter on raw cuts to prevent fraying
- Seam tape on the inside adds weather resistance to finished seams

**Detail**
70D nylon is mid-weight synthetic, heavier than 7D but still slippery on the machine. It's a MYOG workhorse for stuff sacks, dry bags, wind shells, and pack fabric. Coated versions (PU or silicone) need a Teflon foot; uncoated is more forgiving. Tape or seam-seal weather-exposed seams. The fabric takes bar tacks well and holds hardware like cord locks and buckles cleanly.

---

### Nylon Taffeta

**Tags:** `lining` `ultralight` `pack` `shell`

**Needle**
- Primary: Schmetz Microtex Sharp 65/9 or 70/10
- Alternative: Schmetz Universal 70/10

**Thread**
- Gütermann Mara 120 for lightweight taffeta
- Gütermann Mara 100 for standard weight

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 1.8–2.2 mm
- Stitch width: 0 (straight stitch)
- Tension: 3–3.5
- Presser foot: Teflon foot strongly recommended

**Quick Tips**
- Taffeta shifts easily. Use plenty of clips and sew slowly
- Tissue paper under lightweight versions prevents feed dog damage
- French seams or bound seams give clean lining finishes
- Avoid over-pressing. Synthetic taffeta scorches easily; use a press cloth

**Detail**
Nylon taffeta is lining fabric, stuff sack material, and ultralight shell. It rustles audibly and slips constantly. Keeping seam lines straight as layers shift is the central challenge. Stay stitch curved edges immediately after cutting. Use 2.2 mm stitches for linings, 1.8–2.0 mm with reinforced stress points for structural work like stuff sacks. Skip high heat. Low synthetic setting with a press cloth, or finger-press.

---

### Nyco Ripstop

**Tags:** `workwear` `shell` `pocket` `pack`

**Needle**
- Primary: Schmetz Universal 80/12
- Alternative: Schmetz Microtex Sharp 80/12 for tighter weaves

**Thread**
- Gütermann Mara 100 for seams
- Gütermann Mara 70 for reinforced seams and topstitching

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 0 (straight stitch)
- Tension: 4
- Presser foot: Standard foot; Teflon foot if coated

**Quick Tips**
- Ripstop grid means cuts and tears don't propagate. Work with it by cutting on-grid where possible
- Pre-shrink before cutting if using for fitted garments
- Nylon content can fray at cut edges. Heat-seal or serge promptly
- Bar tack at all attachment points. The nylon component is strong but the weave opens under point stress

**Detail**
Nyco (nylon-cotton blend) ripstop combines nylon's durability with cotton's breathability. It's the classic military and workwear fabric for BDUs, field shirts, and cargo pants. The grid resists tearing, but the open weave demands well-finished seams. The cotton content takes medium heat with steam, unlike pure nylon. Flat-felled seams add durability and look clean on both sides. The 4452 handles it at standard settings.

---

### 50/50 NyCo Poplin

**Tags:** `workwear` `shirt` `pants` `pocket`

**Needle**
- Primary: Schmetz Universal 80/12
- Alternative: Schmetz Microtex Sharp 80/12

**Thread**
- Gütermann Mara 100 for seams
- Gütermann Mara 70 for reinforced seams and topstitching

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 0 (straight stitch)
- Tension: 4
- Presser foot: Standard foot

**Quick Tips**
- Frays readily. Finish raw edges promptly with serge, zigzag, or a felled seam
- Use mil-spec construction (flat-felled seams) for authentic BDU and field shirt builds
- Bar tack at pocket corners, belt loop attachments, and fly stops. These are the documented failure points on real surplus garments
- Press with medium heat and steam; the cotton component handles the iron well, the nylon component sets seams crisply

**Detail**
50/50 NyCo poplin is the authentic summer-weight uniform fabric: original BDUs, M65 field shirts, summer cargo pants, Vietnam-era jungle utilities. Compared to Nyco ripstop, this poplin is plain weave (no grid), tighter and smoother, with more drape and better next-to-skin feel. The nylon adds tear strength and abrasion resistance; the cotton keeps it breathable and presentable. It sews like high-quality cotton/poly shirting: straightforward needles and thread, predictable feed, no special tricks. The defining construction move is flat-felled seams on inseams and side seams. That's the mil-spec signature and adds real durability. For accurate field shirts and BDUs, build out the full bar tack set. The fabric rewards the effort.

---

### Cordura 500D

**Tags:** `pack` `structure` `workwear` `pocket`

**Needle**
- Primary: Schmetz Jeans 100/16 or 110/18
- Alternative: Schmetz Heavy Duty 100/16

**Thread**
- Gütermann Mara 30 or Mara 50 for seams (high-tenacity polyester)
- Gütermann Mara 30 for topstitching

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 3.0–3.5 mm
- Stitch width: 0 (straight stitch)
- Tension: 5–6 (higher tension for thick thread in dense fabric)
- Presser foot: Walking foot strongly recommended

**Quick Tips**
- Use a rubber mallet to flatten bulky seam intersections before sewing
- Sew at full speed through thick sections. The motor handles it better than slow crawling
- Use a seam roller or clapper after each seam to reduce bulk
- Topstitching is both decorative and structural. Don't skip it on bags and pack panels

**Detail**
Cordura 500D is high-tenacity nylon for packs, bags, and heavy-duty workwear. Dense and abrasion-resistant, it demands matching needle and thread strength. Mara 30 holds. Lighter threads break under typical Cordura loads. A walking foot is almost mandatory for multi-layer work, keeping layers feeding evenly. Watch for needle heat on long seams. Pause to let the needle cool if skipped stitches start showing up, or swap in a fresh needle. Bar tack every strap and webbing attachment in pack construction.

---

### Polyester Broadcloth

**Tags:** `lining` `pocket` `workwear`

**Needle**
- Primary: Schmetz Universal 80/12
- Alternative: Schmetz Microtex Sharp 80/12 for finer weaves

**Thread**
- Gütermann Mara 100
- Gütermann All-Purpose polyester thread

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.0–2.5 mm
- Stitch width: 0 (straight stitch); 4.0–5.0 mm zigzag for edge finishing
- Tension: 4 (standard)
- Presser foot: Standard foot

**Quick Tips**
- Polyester broadcloth is heat-sensitive. Use a low iron setting and press cloth
- Tends to pucker along seams if tension is too high; test on scrap
- Serge or zigzag edges as it frays steadily
- Good base fabric for linings in workwear pockets and jacket interiors

**Detail**
Polyester broadcloth sews easily but punishes inattention to heat and tension. It's not a primary MYOG structural fabric, but it earns its place as lining, pocket bags, and interior finishes where smoothness matters. Puckering is the main challenge. Polyester thread in polyester fabric behaves unpredictably under tension. Test a seam on scrap and adjust tension down as needed. Press with low heat and a press cloth to avoid the shiny melted look that ruins polyester seams.

### Mesh (Athletic / Spacer / Structural)

**Tags:** `pack` `shell` `base-layer` `midlayer` `pocket`

**Needle**
- Primary: Schmetz Universal 75/11 or 80/12
- Alternative: Schmetz Stretch 75/11 for power mesh or knit mesh

**Thread**
- Gütermann Mara 100 for structural mesh
- Gütermann Elasticord or stretch thread for power mesh applications

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm (structural); 2.0–2.5 mm (power/stretch mesh)
- Stitch width: 3.0–4.0 mm zigzag for stretch mesh; 0 for structural
- Tension: 3.5–4
- Presser foot: Teflon foot or roller foot

**Quick Tips**
- Stabilize edges with stay tape before sewing stretch mesh to prevent distortion
- Use a zigzag stitch for any mesh that needs stretch retention
- Structural mesh (pack pockets) can be sewn straight stitch with standard settings
- Avoid stretching mesh while feeding. Let the machine do the work

**Detail**
Mesh covers several distinct fabrics. Power mesh (fine, stretchy) behaves like a knit and needs a stretch stitch or narrow zigzag. Athletic mesh (open weave for venting) is more stable and sews like a woven. Structural mesh (pack hipbelt windows, back panels) is stiff and dimensionally stable; treat it like a synthetic woven. For MYOG packs, structural mesh with a straight stitch and walking foot gives clean seam lines. For apparel panels, a narrow zigzag retains stretch and survives the loading.

## Stretch & Fleece

### Polartec Power Stretch

**Tags:** `base-layer` `midlayer` `shell`

**Needle**
- Primary: Schmetz Stretch 75/11
- Alternative: Schmetz Ball Point 75/11

**Thread**
- Gütermann Elastic thread for seams under high stretch
- Gütermann Mara 100 for less-stressed seams

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.0–2.5 mm
- Stitch width: 3.0–4.0 mm zigzag or lightning stitch
- Tension: 3–3.5
- Presser foot: Walking foot preferred; standard foot workable with careful feeding

**Quick Tips**
- Never use a straight stitch for seams that will stretch. Threads will pop
- A lightning bolt stitch (if your machine has it) gives the best stretch-recovery
- Avoid stretching the fabric while sewing. Let it feed naturally
- Seam allowances can be topstitched flat to reduce bulk against skin

**Detail**
Power Stretch is a four-way stretch performance fabric, smooth on one face and fleece on the back. Used in base layers, midlayers, and active gear that needs unrestricted movement. A stretch needle is non-negotiable. Universal needles skip stitches on this fabric every time. Drop tension below standard so seams can stretch without breaking thread. Simulated flat-locked seams (wide zigzag, trimmed allowance) cut bulk noticeably and are worth the steps for next-to-skin wear. Test on scrap and stretch the seam hard before trusting it.

### Polartec Grid Fleece

**Tags:** `midlayer` `shell` `ultralight`

**Needle**
- Primary: Schmetz Stretch 75/11 or 80/12
- Alternative: Schmetz Ball Point 80/12

**Thread**
- Gütermann Mara 100 polyester

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 3.5–4.0 mm zigzag
- Tension: 3.5
- Presser foot: Walking foot; avoid standard foot which can compress the grid texture

**Quick Tips**
- The grid texture can shift during sewing. Use plenty of clips
- Sew with the grid side down against the feed dogs for better traction
- Fleece doesn't fray so edges can be left raw. Great for fast finishing
- A walking foot makes an immediate visible difference in stitch consistency

**Detail**
Grid fleece is a low-pile, open-grid midlayer that's lightweight and dries fast. It sews easier than high-pile fleece because the grid feeds consistently. The challenge is loft: the presser foot compresses and distorts the grid, hurting stitch quality. A walking foot spreads pressure and produces cleaner seams. Skip the seam finishing. Trim close and the edges stay put. For MYOG midlayers, simple zigzag construction is fast and durable.

### Polartec Alpha

**Tags:** `insulation` `midlayer` `ultralight`

**Needle**
- Primary: Schmetz Stretch 75/11
- Alternative: Schmetz Universal 80/12

**Thread**
- Gütermann Mara 100 polyester

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 3.0–4.0 mm zigzag
- Tension: 3.5
- Presser foot: Walking foot strongly recommended

**Quick Tips**
- Alpha is fragile until sewn. Handle cut pieces minimally to avoid distorting the batting structure
- Use a longer stitch length than you'd expect. Short stitches perforate the material
- Baste layers together before final sewing to keep everything aligned
- Face fabric and lining do most of the structural work. Alpha is the fill layer

**Detail**
Polartec Alpha is active insulation: lofted batting for high-output use. Unlike down, it insulates when damp and breathes well. In MYOG it sandwiches between a face fabric and lining that carry the seam stress. Alpha is fragile at the edges and pulls apart if handled roughly before it's enclosed. Keep allowances wide (12–15mm) and sew slowly. Channel-quilt the Alpha to the face fabric to stop it shifting. Intermediate project, big payoff in vests and active jackets.

## Knits

### Cotton Jersey

**Tags:** `tshirt` `base-layer` `midlayer`

**Needle**
- Primary: Schmetz Jersey/Ball Point 80/12
- Alternative: Schmetz Stretch 75/11

**Thread**
- Gütermann Mara 100 polyester (slight stretch matches the fabric)
- Gütermann Mara 120 for fine lightweight jersey

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 2.0–3.0 mm narrow zigzag, or lightning stitch if available
- Tension: 3–3.5
- Presser foot: Walking foot strongly recommended

**Quick Tips**
- Never use a straight stitch on seams that will stretch. Threads pop the first time the garment is pulled over the head
- Cut edges curl toward the right side; use clips and don't fight the curl. It relaxes once the seam is stitched
- A twin-needle hem gives a flat, professional finish that mimics a coverstitch
- Stabilize shoulder seams with clear elastic or stay tape. They bear stress and shouldn't stretch

**Detail**
Cotton jersey is the foundational t-shirt fabric, a single knit with a smooth face and slightly textured back. Weights run 140 gsm (light drapey summer tees), 180 gsm (standard), 220+ gsm (heavier structured tees). The signature home-sewer challenge is the cut edge, which curls aggressively on lighter weights. Let it curl, work with it; don't try to press it flat. The other shift from woven is the stitch. A straight stitch on a stretch seam will break the first time it's loaded. Use a narrow zigzag (2.0 mm × 2.5 mm) or a lightning bolt stitch if the 4452 has one. For hems, a twin needle delivers parallel topstitching with a zigzag underneath, mimicking the flatlock or coverstitch on commercial tees.

### Cotton/Spandex Jersey

**Tags:** `tshirt` `base-layer` `midlayer`

**Needle**
- Primary: Schmetz Stretch 75/11
- Alternative: Schmetz Jersey 75/11

**Thread**
- Gütermann Mara 100
- Gütermann Elasticord on hems where extra stretch retention matters

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 2.0–3.0 mm narrow zigzag, or lightning stitch
- Tension: 3–3.5
- Presser foot: Walking foot strongly recommended

**Quick Tips**
- The Stretch needle's specially shaped scarf is essential. Universal and even ballpoint needles will skip stitches over spandex
- Press with low heat only; spandex degrades above ~150°C and turns brittle, ruining the garment's recovery
- Stabilize necklines and shoulders with clear elastic. These are the seams that lose shape first if left unsupported
- Cut on a single layer or with very sharp shears. Spandex blends shift on the cutting mat and come out distorted otherwise

**Detail**
Cotton/spandex jersey (typically 92/8 or 95/5) is the modern stretch t-shirt fabric. Spandex gives the garment recovery; pure cotton jersey gradually bags out. It's the right fabric for fitted tees, leggings, and athletic-leaning casual wear. Sew it like cotton jersey with three real adjustments. A Stretch needle is non-negotiable (Universal and Ballpoint will both skip stitches on the spandex). Keep heat low to avoid degrading the spandex. Stabilize necklines and shoulders, because the fabric stretches in every direction, not just across the grain. Hem with a twin needle for a clean, recoverable finish. Regular thread on topstitching will pop unless you switch to a stretch-thread bobbin or zigzag underneath.

### Cotton Rib Knit

**Tags:** `tshirt` `midlayer` `trim`

**Needle**
- Primary: Schmetz Jersey/Ball Point 80/12
- Alternative: Schmetz Stretch 75/11

**Thread**
- Gütermann Mara 100

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.0–2.5 mm
- Stitch width: 2.5–3.5 mm zigzag
- Tension: 3–3.5
- Presser foot: Walking foot

**Quick Tips**
- Cut rib trim shorter than the opening it's attaching to, typically 80–90% for necklines and 90% for cuffs. It stretches to fit and pulls in cleanly
- Quarter the opening and the rib (mark four equal points on each) and match the quarters before sewing. This distributes the stretch evenly
- Don't pull the rib while attaching it; stretch it to match the quarter marks and let the machine feed
- 1×1 rib (alternating single ribs) is softer and more elastic; 2×2 rib (paired ribs) is heavier and used on sweatshirt cuffs

**Detail**
Cotton rib knit is the companion fabric to every t-shirt and sweatshirt: cuffs, collars, neckbands, hems, and occasionally a ribbed body. The defining property is bidirectional elasticity with strong recovery, exactly what a neckband needs to stretch over a head and snap closed. The core skill is sizing the rib. Too long, the trim flops; too short, it puckers the body. Quartering works: mark four equal points on the rib and the opening, match them, stretch the rib evenly between marks. 1×1 rib is standard for t-shirt necklines. 2×2 rib is heavier, used on sweatshirt cuffs and hems. Buy rib trim that matches the body fabric's fiber content so they shrink and age together.

### French Terry

**Tags:** `midlayer` `loungewear`

**Needle**
- Primary: Schmetz Jersey 80/12
- Alternative: Schmetz Jersey 90/14 for heavier weights

**Thread**
- Gütermann Mara 100

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 2.5–3.5 mm zigzag for stretch seams; 0 for stable seams (yokes, waistbands)
- Tension: 3.5
- Presser foot: Walking foot recommended

**Quick Tips**
- The loop side is the wrong side. Cut all garment pieces with the smooth face out
- Loops can catch on the needle plate; sew with the loop side up if possible, and slow down at the start of each seam
- French terry hems beautifully with a twin needle; for stretch seams, use a narrow zigzag
- Pair with 2×2 rib trim at cuffs and waistbands for the classic sweatshirt silhouette

**Detail**
French terry is a knit with a jersey face and looped back, lighter than sweatshirt fleece. The textured back gives moisture-wicking and good warmth-to-weight. Weights run 220–280 gsm, sweatshirt and light hoodie territory. More forgiving than fine jersey: more body, less curl, easier feed. Two considerations: loop direction (loops face inward in finished garments) and stitch choice (zigzag or lightning for stretch seams, straight only on stable seams like yokes). Standard sweatshirt build order: shoulders → neckband → sleeves in flat → side seams from cuff to hem in one pass.

### Cotton Sweatshirt Fleece

**Tags:** `midlayer` `insulation` `loungewear`

**Needle**
- Primary: Schmetz Jersey 90/14
- Alternative: Schmetz Stretch 90/14

**Thread**
- Gütermann Mara 100 for seams
- Gütermann Mara 70 for topstitching

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 3.0–4.0 mm zigzag for stretch seams
- Tension: 3.5–4
- Presser foot: Walking foot strongly recommended

**Quick Tips**
- Brushed nap sheds visible lint. Clean out the bobbin area and feed dogs after each sweatshirt-sized project
- Bulk at hood-to-body and waistband seams adds up fast; trim seam allowances to 6–8mm after joining and topstitch flat
- Pair with 2×2 cotton rib for cuffs, waistband, and hood opening
- A walking foot is the single biggest quality-of-life upgrade. Without it, the brushed face slips against a standard foot and seams wander

**Detail**
Cotton sweatshirt fleece is the classic hoodie and sweatpants fabric, a heavier knit (typically 280–380 gsm) with a brushed back that traps air and feels soft against skin. Compared to Polartec Grid Fleece, it's heavier, less technical, less moisture-wicking, but warmer per gram and more comfortable. The brushed nap is the main sewing consideration. It sheds lint into the feed dogs and bobbin, slows the foot's glide, and adds bulk at seam intersections. A walking foot fixes the glide. Trimming allowances and pressing flat fixes the bulk. Vacuum the bobbin between projects for the lint. For hoodies, channel-stitch the hood interlining so it doesn't collapse flat behind the wearer's head.

### Merino Wool Jersey

**Tags:** `tshirt` `base-layer` `midlayer`

**Needle**
- Primary: Schmetz Jersey 70/10 or 75/11
- Alternative: Schmetz Stretch 75/11

**Thread**
- Gütermann Mara 120 for fine merino (150–180 gsm)
- Gütermann Mara 100 for heavier interlock merino (200+ gsm)

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 2.0–3.0 mm narrow zigzag, or lightning stitch
- Tension: 3–3.5
- Presser foot: Walking foot strongly recommended

**Quick Tips**
- Never pull while sewing. Pulled seams in merino do not recover and the distortion is permanent
- Use a fresh, fine needle; a dull or oversized needle leaves visible holes in fine merino that don't close up
- Wash on cool with wool detergent before cutting. Merino felts and shrinks dramatically with heat or agitation
- Hand-tie thread tails on visible seams rather than backstitching. Backstitches concentrate needle holes in one spot

**Detail**
Merino wool jersey is the premium base-layer fabric: warm when cold, cool when warm, naturally odor-resistant, quiet against skin. Weights run 150 gsm (ultralight summer travel tees), 200 gsm (standard base layer), 260+ gsm (heavier interlock for cold-weather layering). Merino is more delicate than cotton or synthetic jersey. Needle holes show, the fabric distorts permanently if pulled while sewing, and fine yarns snag on standard needles. A smaller Jersey needle (70/10 or 75/11) and fine thread (Mara 120) minimize the visible footprint of every stitch. Use lightning or narrow zigzag stitches on stretch seams, same as cotton jersey. A well-sewn merino tee lasts years. A rushed one shows puckered seams and broken yarns within a few washes.

## Technical

### X-Pac VX21

**Tags:** `pack` `shelter` `structure` `shell`

**Needle**
- Primary: Schmetz Jeans 90/14
- Alternative: Schmetz Microtex Sharp 90/14

**Thread**
- Gütermann Mara 70 or Mara 50 (high-tenacity polyester)

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 3.0–3.5 mm
- Stitch width: 0 (straight stitch)
- Tension: 4–4.5
- Presser foot: Teflon foot essential — standard foot will stick and drag

**Quick Tips**
- Every needle hole is permanent. Plan seam lines carefully before sewing
- Use clips only; no pins
- Seam tape on the inside makes seams weather-resistant and hides needle holes
- The X grid is a visual guide. Align seams parallel to the grid for a clean look

**Detail**
X-Pac is a laminate of a face fabric, X-grid scrim, and a waterproof film backer. It's the go-to for MYOG packs, pouches, and bivy covers. The laminate doesn't fray, holds its shape, and resists water. But every needle hole punctures the waterproof layer; seam sealer or tape matters on waterproof builds. A Teflon foot is non-negotiable. The film backer grips a standard foot and causes uneven feeding and skipped stitches. VX21 is the most common weight for pack panels and pouches.

### Silnylon / Silpoly

**Tags:** `shelter` `ultralight` `shell` `pack`

**Needle**
- Primary: Schmetz Microtex Sharp 70/10
- Alternative: Schmetz Universal 75/11

**Thread**
- Gütermann Mara 120 (fine thread to minimize hole size)

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 1.8–2.2 mm
- Stitch width: 0 (straight stitch)
- Tension: 3–3.5
- Presser foot: Teflon foot essential

**Quick Tips**
- Silicone coating makes this extremely slippery. Tissue paper above and below is highly recommended
- Every seam needs seam sealer for waterproof performance
- Work in a warm room. The silicone coating stiffens in cold
- Bias edges stretch dramatically. Stabilize before sewing

**Detail**
Silnylon and silpoly are silicone-impregnated ultralight fabrics for tarps, bivy covers, wind shells, and stuff sacks. The silicone gives them water resistance and low friction. It also makes them brutal to sew. They slide, bunch, and shift constantly. Tissue paper is the most reliable fix: sandwich the fabric, sew through, tear the paper away after. Keep seam allowances narrow and consistent (8–10mm) for light builds. Seal every finished seam (silicone-based for silnylon, urethane for silpoly). Not a beginner fabric. Rewarding for ultralight shelter and bivy projects.

### Dyneema Composite Fabric (DCF)

**Tags:** `shelter` `ultralight` `pack` `structure`

**Needle**
- Primary: Schmetz Microtex Sharp 70/10 or 75/11
- Alternative: Schmetz Universal 75/11

**Thread**
- Gütermann Mara 120 (minimize hole size)
- Some DCF projects use bonding tape instead of stitching for waterproof seams

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 3.0–4.0 mm (longer stitch = fewer holes = stronger fabric retention)
- Stitch width: 0 (straight stitch)
- Tension: 3.5
- Presser foot: Teflon foot essential

**Quick Tips**
- Use the longest stitch length that still holds the seam. Every hole weakens the laminate
- Never backstitch. Tie thread tails by hand or use a seam knot
- Tape seams with DCF seam tape for waterproof and structural reinforcement
- Handle with clean hands. Oils from skin degrade the adhesive on some versions

**Detail**
DCF (formerly Cuben Fiber) is an ultra-high-strength laminate film for ultralight tarps, stuff sacks, and bivy covers. It doesn't stretch, doesn't fray, and is extremely strong for its weight. It's also unforgiving. Needle holes don't close up; every stitch is a permanent perforation. Longer stitch lengths are structurally better, not worse. Never backstitch. It concentrates holes in one spot. Secure thread ends by tying or with a seam lock knot. Most experienced DCF sewers use bonding tape (Cuben tape or similar) for most seams and stitch only where mechanical stress demands it. Advanced MYOG material; approach it after silnylon or X-Pac.

### Softshell (Woven Stretch)

**Tags:** `shell` `midlayer` `workwear`

**Needle**
- Primary: Schmetz Stretch 75/11 or 80/12
- Alternative: Schmetz Microtex Sharp 80/12 for non-stretch woven softshell

**Thread**
- Gütermann Mara 100

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 2.0–3.0 mm zigzag for stretch versions; 0 for non-stretch
- Tension: 4
- Presser foot: Walking foot recommended

**Quick Tips**
- Test stitch type on scrap. Stretch vs. non-stretch softshell behave very differently
- The DWR finish can cause skipped stitches. Sew slowly and use a fresh needle
- Seam tape on exposed seams restores DWR protection lost at the needle holes
- Press with a low-heat setting and press cloth. The DWR coating can degrade with direct heat

**Detail**
Softshell is a broad category: woven or knit fabrics with a DWR finish, often bonded to a fleece or tricot backer. The woven-stretch varieties are the most common for MYOG technical pants, jackets, and active layers. The DWR finish is the main sewing challenge. It causes needle drag and skipped stitches under a standard foot. A Teflon or walking foot helps. The bonded backer adds bulk. Plan seam allowances accordingly and trim carefully. For exposed seams, seam tape restores water resistance and gives a cleaner inside finish.

### Robic Nylon

**Tags:** `pack` `structure` `shell` `workwear`

**Needle**
- Primary: Schmetz Jeans 90/14
- Alternative: Schmetz Universal 90/14

**Thread**
- Gütermann Mara 70 or Mara 50

**Machine:** Singer Heavy Duty 4452

**Machine Settings**
- Stitch length: 2.5–3.0 mm
- Stitch width: 0 (straight stitch)
- Tension: 4–4.5
- Presser foot: Standard foot; Teflon foot for coated versions

**Quick Tips**
- Heat-seal raw edges. Robic frays and the high-tenacity weave will unravel quickly if left raw
- Bar tack all hardware attachment points. Webbing and hardware put concentrated stress on the fabric
- Use high-tenacity thread (Mara 50 or 70). This fabric is stronger than standard thread and the thread will be the failure point otherwise
- Clips preferred over pins on coated versions

**Detail**
Robic is a high-tenacity nylon built specifically for pack and bag construction. It offers better abrasion resistance than standard nylon at comparable weight, ideal for pack bodies, hipbelts, and shoulder straps. It sews like Cordura, lighter and more pliable. The weave is tight enough that needle choice matters; a jeans needle punches cleanly without deflecting. Mara 50 is the minimum thread for pack work. Lighter thread risks failing before the fabric, the wrong failure mode in a load-bearing pack.
